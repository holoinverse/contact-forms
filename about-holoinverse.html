<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>About | HoloInverse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:transparent;
color:#222;
padding:10px 16px;
}

.container{
max-width:760px;
margin:auto;
padding:10px 28px 34px;
line-height:1.8;
font-size:16px;
}

.lang-switch{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:32px;
}

.lang-switch button{
padding:10px 18px;
border:1px solid #111;
border-radius:999px;
background:white;
color:#111;
font-size:14px;
cursor:pointer;
}

.lang-switch button.active{
background:#111;
color:white;
}

h2{
text-align:center;
font-size:28px;
margin-bottom:28px;
font-weight:600;
}

p{
margin-bottom:22px;
color:#444;
}

@media(max-width:480px){
body{
padding:8px 12px;
}

.container{
padding:0;
font-size:15px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="lang-switch">
<button type="button" id="btn-en" class="active" onclick="setLanguage('en')">English</button>
<button type="button" id="btn-pt" onclick="setLanguage('pt')">Português</button>
</div>

<div id="content"></div>

</div>

<script>
const about = {
en: {
title: "",
content: `
<p>HoloInverse is an independent artistic universe dedicated to the creation of symbolic art and visual systems, expressed through physical and wearable forms.</p>

<p>The project explores identity, perception, and inner experience through curated collections of wearable pieces, printed artworks, and applied design objects. Clothing, posters, and visual compositions function as material expressions of an evolving symbolic language, developed across different formats and platforms.</p>

<p>Alongside its artistic collections, HoloInverse also develops independent symbolic systems. One of these is ZINC, a structured, card-based symbolic deck designed to observe and identify inner states and patterns within the human energetic field.</p>

<p>HoloInverse was created by a holistic psychotherapist and psychic reader, also the creator of Akasha & Prana, a project dedicated to energetic field reading. These practices inform the conceptual foundation of the work, without imposing fixed interpretations or prescriptive meanings.</p>

<p>Rather than offering narratives or conclusions, HoloInverse exists as an open field of perception, where symbols, structures, and images invite observation and personal interpretation.</p>

<p>The universe unfolds gradually, guided by visual coherence, symbolic structure, and long-term artistic continuity.</p>
`
},

pt: {
title: "",
content: `
<p>O HoloInverse é um universo artístico independente dedicado à criação de arte simbólica e sistemas visuais, expressos por meio de objetos físicos, peças vestíveis e coleções visuais.</p>

<p>O projeto explora identidade, percepção e experiência interior através de coleções selecionadas de vestuário, obras impressas e objetos de design. Camisetas, moletons, pôsteres, cadernos e composições visuais funcionam como expressões materiais de uma linguagem simbólica em constante evolução, desenvolvida em diferentes formatos e plataformas.</p>

<p>Além de suas coleções artísticas, o HoloInverse também desenvolve sistemas simbólicos independentes. Um deles é o ZINC, um sistema estruturado baseado em cartas, criado para observar e identificar estados internos e padrões presentes no campo energético humano.</p>

<p>O HoloInverse foi criada por uma psicoterapeuta holística e leitora psíquica, também fundadora do projeto Akasha & Prana, dedicado à leitura do campo energético. Essas práticas influenciam a base conceitual do trabalho, sem impor interpretações fixas ou significados pré-determinados.</p>

<p>Em vez de oferecer narrativas ou conclusões, o HoloInverse existe como um campo aberto de percepção, onde símbolos, estruturas e imagens convidam à observação e à interpretação pessoal.</p>

<p>Este universo continua a se desenvolver gradualmente, guiado pela coerência visual, pela estrutura simbólica e por uma visão artística de longo prazo.</p>
`
}
};

function setLanguage(lang){
document.getElementById("content").innerHTML = about[lang].content;

document.getElementById("btn-en").classList.toggle("active", lang === "en");
document.getElementById("btn-pt").classList.toggle("active", lang === "pt");
}

setLanguage("en");
</script>

</body>
</html>
