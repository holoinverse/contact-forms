<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | HoloInverse</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial, Helvetica, sans-serif;
background:transparent;
color:#222;
padding:10px 16px;
}

.container{
max-width:620px;
margin:auto;
padding:10px 28px 34px;
}

.lang-switch{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:28px;
}

.lang-switch button{
width:auto;
padding:10px 18px;
border:1px solid #111;
border-radius:999px;
background:white;
color:#111;
font-size:14px;
cursor:pointer;
}

.lang-switch button.active{
background:#111;
color:white;
}

.intro{
text-align:center;
line-height:1.75;
margin-bottom:35px;
color:#555;
font-size:16px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
font-size:15px;
}

input, textarea, select{
width:100%;
padding:14px 15px;
border:1px solid #d9d9d9;
border-radius:12px;
font-size:16px;
margin-bottom:22px;
background:#fff;
}

textarea{
min-height:140px;
resize:vertical;
}

.submit-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:17px;
cursor:pointer;
background:#111;
color:#fff;
font-weight:700;
}

.submit-btn:hover{opacity:.92;}

@media(max-width:480px){
body{padding:8px 12px;}
.container{padding:0;}
}
</style>
</head>

<body>

<div class="container">

<div class="lang-switch">
<button type="button" id="btn-en" class="active" onclick="setLanguage('en')">English</button>
<button type="button" id="btn-pt" onclick="setLanguage('pt')">Português</button>
</div>

<div class="intro" id="intro"></div>

<form action="https://formspree.io/f/xpqerzvk" method="POST">

<label id="label-name">Name</label>
<input type="text" name="name" required>

<label id="label-email">Email</label>
<input type="email" name="email" required>

<label id="label-subject">Subject</label>
<input type="text" name="subject">

<label id="label-message">Message</label>
<textarea name="message" required></textarea>

<button class="submit-btn" type="submit" id="submit-btn">Send Message</button>

</form>

</div>

<script>
const content = {
en: {
intro: `Questions, collaborations,<br>
custom requests or general inquiries related to HoloInverse?<br><br>
Feel free to send a message below.<br><br>
We will get back to you as soon as possible.`,
name: "Name",
email: "Email",
subject: "Subject",
message: "Message",
submit: "Send Message"
},
pt: {
intro: `Dúvidas, colaborações,<br>
pedidos personalizados ou assuntos relacionados à HoloInverse?<br><br>
Envie sua mensagem abaixo.<br><br>
Retornaremos o mais breve possível.`,
name: "Nome",
email: "E-mail",
subject: "Assunto",
message: "Mensagem",
submit: "Enviar mensagem"
}
};

function setLanguage(lang){
document.getElementById("intro").innerHTML = content[lang].intro;
document.getElementById("label-name").innerText = content[lang].name;
document.getElementById("label-email").innerText = content[lang].email;
document.getElementById("label-subject").innerText = content[lang].subject;
document.getElementById("label-message").innerText = content[lang].message;
document.getElementById("submit-btn").innerText = content[lang].submit;

document.getElementById("btn-en").classList.toggle("active", lang === "en");
document.getElementById("btn-pt").classList.toggle("active", lang === "pt");

}

setLanguage("en");
</script>

</body>
</html>
