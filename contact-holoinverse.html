<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | HoloInverse</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:transparent;
color:#222;
padding:10px 16px;
}

.container{
max-width:700px;
margin:auto;
padding:10px 28px 34px 28px;
}

.intro{
text-align:center;
line-height:1.75;
margin-bottom:35px;
color:#555;
font-size:16px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
font-size:15px;
}

input,
textarea{
width:100%;
padding:14px 15px;
border:1px solid #d9d9d9;
border-radius:12px;
font-size:16px;
margin-bottom:22px;
background:#fff;
}

textarea{
min-height:140px;
resize:vertical;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:17px;
cursor:pointer;
background:#111;
color:#fff;
font-weight:700;
}

button:hover{
opacity:.92;
}

@media(max-width:480px){

body{
padding:8px 12px;
}

.container{
padding:0;
}

}

</style>
</head>

<body>

<div class="container">

<div class="intro">

For inquiries, collaborations, licensing opportunities,
or professional contact related to HoloInverse,
please leave a message below.

<br><br>

We will get back to you as soon as possible.

</div>

<form action="https://formspree.io/f/xpqerzvk" method="POST">

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Subject</label>
<input type="text" name="subject">

<label>Message</label>
<textarea name="message" required></textarea>

<button type="submit">
Send Message
</button>

</form>

</div>

</body>
</html>
