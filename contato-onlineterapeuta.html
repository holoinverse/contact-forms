<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contato | OnlineTerapeuta</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, Helvetica, sans-serif;
background:#f7f7f7;
padding:40px 20px;
color:#222;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
font-size:42px;
margin-bottom:20px;
text-align:center;
}

.intro{
text-align:center;
line-height:1.7;
margin-bottom:40px;
color:#555;
}

label{
display:block;
margin-bottom:8px;
font-weight:bold;
}

input,
textarea{
width:100%;
padding:15px;
border:1px solid #ddd;
border-radius:12px;
font-size:16px;
margin-bottom:25px;
}

textarea{
min-height:180px;
resize:vertical;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:12px;
font-size:18px;
cursor:pointer;
background:#c9dd5f;
color:#000;
font-weight:bold;
}

button:hover{
opacity:.9;
}

.footer{
margin-top:30px;
text-align:center;
font-size:14px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Contato</h1>

<div class="intro">
Tem alguma dúvida sobre os atendimentos, valores ou formas de acompanhamento?<br><br>
Envie uma mensagem abaixo.<br>
Nossa equipe analisará seu contato e retornará o mais breve possível.
</div>

<form action="https://formspree.io/f/xzdqrgew" method="POST">

<label>Nome</label>
<input type="text" name="nome" required>

<label>E-mail</label>
<input type="email" name="email" required>

<label>Assunto</label>
<input type="text" name="assunto" required>

<label>Mensagem</label>
<textarea name="mensagem" required></textarea>

<button type="submit">
Enviar Mensagem
</button>

</form>

<div class="footer">
OnlineTerapeuta
</div>

</div>

</body>
</html>
