<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato | OnlineTerapeuta</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f5f5f2;
  color:#222;
  padding:28px 16px;
}

.container{
  max-width:620px;
  margin:auto;
  background:#fff;
  padding:34px 28px;
  border-radius:22px;
  box-shadow:0 12px 35px rgba(0,0,0,.07);
}

h1{
  font-size:34px;
  text-align:center;
  margin-bottom:18px;
  letter-spacing:-.5px;
}

.intro{
  text-align:center;
  line-height:1.65;
  margin-bottom:32px;
  color:#555;
  font-size:16px;
}

label{
  display:block;
  margin-bottom:7px;
  font-weight:700;
  font-size:15px;
}

input, textarea{
  width:100%;
  padding:14px 15px;
  border:1px solid #d9d9d9;
  border-radius:12px;
  font-size:16px;
  margin-bottom:20px;
  background:#fff;
}

textarea{
  min-height:145px;
  resize:vertical;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-size:17px;
  cursor:pointer;
  background:#cfe85c;
  color:#111;
  font-weight:700;
}

button:hover{opacity:.92;}

.note{
  margin-top:18px;
  text-align:center;
  font-size:13px;
  color:#777;
  line-height:1.5;
}

.footer{
  margin-top:24px;
  text-align:center;
  font-size:13px;
  color:#777;
}

@media(max-width:480px){
  body{padding:18px 12px;}
  .container{padding:28px 20px;border-radius:18px;}
  h1{font-size:30px;}
}
</style>
</head>

<body>

<div class="container">

<h1>Contato</h1>

<div class="intro">
Tem alguma dúvida sobre os atendimentos, valores ou formas de acompanhamento?<br>
Envie sua mensagem abaixo.<br><br>
Nossa equipe analisará seu contato e retornará o mais breve possível.
</div>

<form action="https://formspree.io/f/xzdqrgew" method="POST">

<label for="nome">Nome</label>
<input id="nome" type="text" name="nome" required>

<label for="email">E-mail</label>
<input id="email" type="email" name="email" required>

<label for="assunto">Assunto</label>
<input id="assunto" type="text" name="assunto" required>

<label for="mensagem">Mensagem</label>
<textarea id="mensagem" name="mensagem" required></textarea>

<button type="submit">Enviar Mensagem</button>

</form>

<div class="note">
Após o envio, você receberá uma confirmação de que sua mensagem foi enviada.
</div>

<div class="footer">
OnlineTerapeuta
</div>

</div>

</body>
</html>
